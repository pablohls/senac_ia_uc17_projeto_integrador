# ==========================================================================
# TrendRadar — Configuração central do pipeline
# ==========================================================================
# Regra do projeto (Coding Standards): NENHUM número mágico no código.
# Todo parâmetro ajustável da pipeline mora aqui e é carregado/validado por
# src/common/config.py (pydantic). A banca valoriza poder ajustar e justificar
# cada parâmetro a partir de um único lugar.
# --------------------------------------------------------------------------

# Fontes de coleta (portais de tecnologia em PT-BR).
fontes:
  - olhar_digital
  - canaltech

# Parâmetros da coleta (Story 1.2 — coletor de sitemap).
# O coletor lê o sitemap index do portal, seleciona os mapas dos últimos
# `meses` e extrai as URLs datadas dos artigos. Nada de número mágico no código.
coleta:
  sitemap:
    # Sitemap index do Olhar Digital (aponta para os mapas mensais).
    index_url: https://olhardigital.com.br/sitemap.xml
    # Janela histórica: quantos meses para trás coletar (inclui o mês corrente).
    meses: 4
    # Filtro opcional por categoria (vazio = todas as categorias).
    categorias: []
    # Identificação enviada ao servidor (NFR4 — coleta educada).
    user_agent: "TrendRadar/0.1 (projeto integrador IA; coleta academica)"
    # Pausa entre requisições, em segundos (rate-limit ~1 req/s, NFR4).
    rate_limit_s: 1.0
  # Parâmetros da extração de texto (Story 1.3 — dataset congelado A1).
  extract:
    # Identificação enviada ao servidor (NFR4).
    user_agent: "TrendRadar/0.1 (projeto integrador IA; coleta academica)"
    # Pausa entre downloads de artigos, em segundos (~1 req/s, NFR4).
    rate_limit_s: 1.0
    # Tempo máximo por requisição, em segundos.
    timeout_s: 30
    # Limite opcional de artigos a extrair (útil em amostra/teste). null = todos.
    limite: null
  # Segunda fonte (Story 1.4 — Canaltech). Estrutura diferente do Olhar Digital:
  # a data vem do <lastmod> do sitemap (não da URL) e os shards não são mensais.
  canaltech:
    # Sitemap index do Canaltech (aponta para shards geral-N.xml).
    index_url: https://static.canaltech.com.br/smap/geral.xml
    # Janela histórica em meses (filtra por lastmod >= 1º dia do mês mais antigo).
    meses: 4
    # Identificação enviada ao servidor (NFR4).
    user_agent: "TrendRadar/0.1 (projeto integrador IA; coleta academica)"
    # Pausa entre requisições, em segundos (~1 req/s, NFR4).
    rate_limit_s: 1.0

# Modelo de embeddings semânticos (Sentence-Transformers, suporte a PT-BR).
# Multilíngue para cobrir bem português; trocável sem mexer no código.
embedding_model: sentence-transformers/paraphrase-multilingual-mpnet-base-v2

# Parâmetros do Trend Score (ver docs/architecture/adr-001-trend-score.md).
trend_score:
  w: 7            # janela (dias) da média móvel das séries por tópico
  alpha: 1.0      # suavização de Laplace na razão recente/base (evita /0)
  H: 60           # horizonte (dias) usado como base histórica de comparação
  lambda_burst: 1.0  # peso do termo de "surto" (burst) na Camada 1
  n_min: 5        # nº mínimo de documentos p/ um tópico entrar no ranking
  k: 2.5          # nº de desvios-padrão p/ marcar anomalia (Camada 2 / alertas)
