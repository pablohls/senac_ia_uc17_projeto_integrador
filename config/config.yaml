# ==========================================================================
# TrendRadar — Configuração central do pipeline
# ==========================================================================
# Regra do projeto (Coding Standards): NENHUM número mágico no código.
# Todo parâmetro ajustável da pipeline mora aqui e é carregado/validado por
# src/common/config.py (pydantic). A banca valoriza poder ajustar e justificar
# cada parâmetro a partir de um único lugar.
# --------------------------------------------------------------------------

# Fontes de coleta (portais de tecnologia em PT-BR).
fontes:
  - olhar_digital
  - canaltech

# Parâmetros da coleta (Story 1.2 — coletor de sitemap).
# O coletor lê o sitemap index do portal, seleciona os mapas dos últimos
# `meses` e extrai as URLs datadas dos artigos. Nada de número mágico no código.
coleta:
  sitemap:
    # Sitemap index do Olhar Digital (aponta para os mapas mensais).
    index_url: https://olhardigital.com.br/sitemap.xml
    # Janela histórica: quantos meses para trás coletar (inclui o mês corrente).
    meses: 4
    # Filtro opcional por categoria (vazio = todas as categorias).
    categorias: []
    # Identificação enviada ao servidor (NFR4 — coleta educada).
    user_agent: "TrendRadar/0.1 (projeto integrador IA; coleta academica)"
    # Pausa entre requisições, em segundos (rate-limit ~1 req/s, NFR4).
    rate_limit_s: 1.0
  # Parâmetros da extração de texto (Story 1.3 — dataset congelado A1).
  extract:
    # Identificação enviada ao servidor (NFR4).
    user_agent: "TrendRadar/0.1 (projeto integrador IA; coleta academica)"
    # Pausa entre downloads de artigos, em segundos (~1 req/s, NFR4).
    rate_limit_s: 1.0
    # Tempo máximo por requisição, em segundos.
    timeout_s: 30
    # Limite opcional de artigos a extrair (útil em amostra/teste). null = todos.
    limite: null
  # Segunda fonte (Story 1.4 — Canaltech). Estrutura diferente do Olhar Digital:
  # a data vem do <lastmod> do sitemap (não da URL) e os shards não são mensais.
  canaltech:
    # Sitemap index do Canaltech (aponta para shards geral-N.xml).
    index_url: https://static.canaltech.com.br/smap/geral.xml
    # Janela histórica em meses (filtra por lastmod >= 1º dia do mês mais antigo).
    meses: 4
    # Identificação enviada ao servidor (NFR4).
    user_agent: "TrendRadar/0.1 (projeto integrador IA; coleta academica)"
    # Pausa entre requisições, em segundos (~1 req/s, NFR4).
    rate_limit_s: 1.0

# Modelo de embeddings semânticos (Sentence-Transformers, suporte a PT-BR).
# Multilíngue para cobrir bem português; trocável sem mexer no código.
embedding_model: sentence-transformers/paraphrase-multilingual-mpnet-base-v2

# Parâmetros da limpeza/normalização PT-BR (Story 2.1).
limpeza:
  # Descarta textos com menos caracteres que isso após a limpeza.
  min_text_length: 10

# Parâmetros da geração de embeddings (Story 2.2).
embedding:
  # model_name herda `embedding_model` acima quando omitido.
  batch_size: 64

# Parâmetros do clustering BERTopic/UMAP/HDBSCAN (Story 2.3).
# Calibrados para o corpus completo (~7 mil artigos / 4 meses); para rodar
# sobre amostras pequenas, reduzir min_topic_size/min_cluster_size (ex.: 2).
# Justificativa dos valores: gate de coerência em docs/qa/coerencia-topicos.md.
clustering:
  min_topic_size: 10
  n_neighbors: 15
  n_components: 5
  min_cluster_size: 10
  cluster_selection_epsilon: 0.1
  random_state: 42
  label_top_n: 3

# Parâmetros do Trend Score (ver docs/architecture/adr-001-trend-score.md).
trend_score:
  w: 7            # janela (dias) da média móvel das séries por tópico
  alpha: 1.0      # suavização de Laplace na razão recente/base (evita /0)
  H: 60           # horizonte (dias) usado como base histórica de comparação
  lambda_burst: 1.0  # peso do termo de "surto" (burst) na Camada 1
  n_min: 5        # nº mínimo de documentos p/ um tópico entrar no ranking
  k: 2.5          # nº de desvios-padrão p/ marcar anomalia (Camada 2 / alertas)
  # Camada 2 — LSTM (Story 3.3)
  sigma_min: 1.0      # piso do σ da surpresa (σ≈0 em série constante explodiria o z)
  seed: 42            # seed torch/numpy (reprodutibilidade do treino)
  lstm_hidden_size: 32  # neurônios da camada oculta
  lstm_epochs: 50       # épocas de treino por tópico
  lstm_lr: 0.01         # learning rate do Adam

# Parâmetros da camada de IA generativa (Fase 5 — ADR-002, Story 5.1).
# Cliente OpenAI-compatible: trocar base_url/model alterna entre Ollama local
# (demo, soberania de dados) e um endpoint remoto (dev) SEM tocar no código.
# Falha do LLM nunca derruba o pipeline: chat() devolve None (degradação graciosa).
insight:
  # Endpoint OpenAI-compatible. Default: Ollama local na VM/demo.
  # Para endpoint remoto, troque base_url + model (ex.: API OpenAI-compatible da nuvem).
  base_url: http://localhost:11434/v1
  # Modelo firmado no ADR-002 (líder PT-BR no Open PT-LLM Leaderboard).
  model: qwen2.5:14b
  # Nome da env var com a chave do endpoint. Sem a var definida, usa o dummy
  # "ollama" (o Ollama ignora a chave). NUNCA colocar segredo neste arquivo.
  api_key_env: LLM_API_KEY
  temperature_batch: 0.0   # Analista IA (batch): determinístico e reprodutível
  temperature_chat: 0.3    # RAG conversacional: leve variação, ainda factual
  max_tokens: 512          # limite de tokens por resposta
  timeout_s: 120.0         # acomoda o cold start do Ollama (~60s carregando na VRAM)
  rag_top_k: 6             # nº de trechos recuperados por pergunta (RAG)
  top_artigos: 5           # nº de artigos por tópico no prompt do Analista IA
  trecho_max_chars: 500    # tamanho máximo do trecho de cada artigo no prompt
